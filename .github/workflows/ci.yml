# CI gate for atlas-corpus: syntax-check every module, run the stdlib
# unit suite, prove the image builds, and report to #ci-cd via direct curl.
#
# workflow_dispatch is declared so ramone-voice-trigger can fire this repo
# without a follow-up patch.

name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Syntax-check every module
        run: python -m compileall app

      - name: Unit suite
        run: python -m unittest discover -s tests -t .

      - name: Prove the image builds
        run: docker compose build
        env:
          CORPUS_SECRET: ci-parse-only

      - name: Notify #ci-cd
        if: always()
        env:
          WEBHOOK: ${{ secrets.DISCORD_CICD_WEBHOOK }}
          STATUS: ${{ job.status }}
        run: |
          [ -z "$WEBHOOK" ] && echo "no webhook secret; skipping" && exit 0
          if [ "$STATUS" = "success" ]; then COLOUR=4906624; ICON="🟢"; else COLOUR=14830410; ICON="🔴"; fi
          RUN_URL="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          PAYLOAD=$(jq -n \
            --arg icon "$ICON" \
            --arg status "$STATUS" \
            --arg run_url "$RUN_URL" \
            --argjson colour "$COLOUR" \
            '{
              username: "ci-cd",
              embeds: [{
                title: "atlas-corpus CI",
                description: ($icon + " compileall + unittest + docker compose build: " + $status),
                color: $colour,
                fields: [{name: "Run", value: ("[logs](" + $run_url + ")"), inline: true}],
                footer: {text: "Atlas Systems — Pipeline"}
              }]
            }')
          curl -sS -X POST "$WEBHOOK" -H "Content-Type: application/json" -d "$PAYLOAD"
