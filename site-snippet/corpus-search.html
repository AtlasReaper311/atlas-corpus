<!--
  corpus-search.html
  Self-contained semantic search over the Atlas Systems corpus.

  Drop this whole block into any page. It inherits the site's CSS
  custom properties and fonts when present and carries hex fallbacks.
  One IIFE, styles scoped under .cs-w, results rendered via
  textContent only (never innerHTML with response data).
-->
<section class="cs-w" id="corpus-search" aria-label="Search the Atlas Systems corpus">
  <style>
    .cs-w {
      --csw-bg: var(--bg-1, #111118);
      --csw-bg-2: var(--bg-2, #1a1a24);
      --csw-border: var(--border, rgba(255, 255, 255, 0.08));
      --csw-text: var(--text, #e8e8e0);
      --csw-dim: var(--text-dim, #aaa9a0);
      --csw-faint: var(--text-faint, #555560);
      --csw-accent: var(--accent, #f5a623);
      display: block;
      background: var(--csw-bg);
      border: 1px solid var(--csw-border);
      border-radius: 6px;
      padding: 20px;
      font-family: "IBM Plex Mono", monospace;
      font-size: 13px;
      line-height: 1.6;
      color: var(--csw-text);
      max-width: 720px;
    }
    .cs-w * { box-sizing: border-box; }
    .cs-w-head { color: var(--csw-faint); margin-bottom: 12px; }
    .cs-w-head strong { color: var(--csw-text); font-weight: 500; letter-spacing: 0.04em; }
    .cs-w-form { display: flex; gap: 8px; }
    .cs-w-input {
      flex: 1 1 auto;
      min-width: 0;
      background: var(--csw-bg-2);
      border: 1px solid var(--csw-border);
      border-radius: 4px;
      color: var(--csw-text);
      font: inherit;
      padding: 8px 12px;
    }
    .cs-w-input:focus {
      outline: none;
      border-color: var(--csw-accent);
    }
    .cs-w-btn {
      flex: none;
      background: transparent;
      border: 1px solid var(--csw-accent);
      border-radius: 4px;
      color: var(--csw-accent);
      font: inherit;
      padding: 8px 16px;
      cursor: pointer;
    }
    .cs-w-btn:hover { background: rgba(245, 166, 35, 0.12); }
    .cs-w-btn:disabled { opacity: 0.5; cursor: wait; }
    .cs-w-status { margin: 12px 0 0; color: var(--csw-faint); font-size: 12px; }
    .cs-w-results { list-style: none; margin: 12px 0 0; padding: 0; display: grid; gap: 10px; }
    .cs-w-hit {
      background: var(--csw-bg-2);
      border: 1px solid var(--csw-border);
      border-left: 2px solid var(--csw-accent);
      border-radius: 4px;
      padding: 12px 14px;
    }
    .cs-w-hit-meta {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: baseline;
      font-size: 11px;
      margin-bottom: 6px;
    }
    .cs-w-type {
      color: var(--csw-accent);
      border: 1px solid var(--csw-border);
      border-radius: 3px;
      padding: 0 6px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .cs-w-path { color: var(--csw-dim); overflow-wrap: anywhere; }
    .cs-w-score { color: var(--csw-faint); margin-left: auto; }
    .cs-w-excerpt { color: var(--csw-dim); font-size: 12px; }
  </style>

  <p class="cs-w-head"><strong>ATLAS CORPUS</strong> // ask the estate anything it has written</p>

  <form class="cs-w-form" id="csw-form">
    <label for="csw-q" class="cs-w-visually-hidden" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0);">Search query</label>
    <input class="cs-w-input" id="csw-q" name="q" type="search"
           placeholder="how do deploys get to Cloudflare?" maxlength="500"
           autocomplete="off" spellcheck="false" />
    <button class="cs-w-btn" id="csw-go" type="submit">search</button>
  </form>

  <p class="cs-w-status" id="csw-status" aria-live="polite"></p>
  <ol class="cs-w-results" id="csw-results"></ol>

  <script>
    (function () {
      "use strict";
      var isLocalLab = location.hostname === "localhost" || location.hostname === "127.0.0.1";
      var localCorpusHost = location.hostname === "127.0.0.1" ? "127.0.0.1" : "localhost";
      var ENDPOINT = isLocalLab
        ? "http://" + localCorpusHost + ":8092/search"
        : "https://corpus.atlas-systems.uk/search";
      var form = document.getElementById("csw-form");
      var input = document.getElementById("csw-q");
      var button = document.getElementById("csw-go");
      var status = document.getElementById("csw-status");
      var list = document.getElementById("csw-results");

      function clearResults() {
        while (list.firstChild) list.removeChild(list.firstChild);
      }

      function renderHit(hit) {
        var item = document.createElement("li");
        item.className = "cs-w-hit";

        var meta = document.createElement("div");
        meta.className = "cs-w-hit-meta";

        var type = document.createElement("span");
        type.className = "cs-w-type";
        type.textContent = hit.doc_type;

        var path = document.createElement("span");
        path.className = "cs-w-path";
        path.textContent = hit.source_repo + "/" + hit.file_path;

        var score = document.createElement("span");
        score.className = "cs-w-score";
        score.textContent = hit.score.toFixed(2);

        meta.appendChild(type);
        meta.appendChild(path);
        meta.appendChild(score);

        var excerpt = document.createElement("p");
        excerpt.className = "cs-w-excerpt";
        var text = hit.text.length > 320 ? hit.text.slice(0, 319) + "…" : hit.text;
        excerpt.textContent = text;

        item.appendChild(meta);
        item.appendChild(excerpt);
        list.appendChild(item);
      }

      form.addEventListener("submit", function (event) {
        event.preventDefault();
        var query = input.value.trim();
        if (!query) return;

        button.disabled = true;
        status.textContent = "searching…";
        clearResults();

        fetch(ENDPOINT, {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ query: query, top_k: 5 }),
        })
          .then(function (response) {
            if (response.status === 429) throw new Error("rate limited; wait a minute");
            if (!response.ok) throw new Error("corpus answered " + response.status);
            return response.json();
          })
          .then(function (data) {
            if (!data.hits.length) {
              status.textContent = "nothing relevant indexed for that";
              return;
            }
            status.textContent = data.hits.length + " hits · " + data.took_ms + "ms";
            data.hits.forEach(renderHit);
          })
          .catch(function (err) {
            status.textContent = "search unavailable: " + err.message;
          })
          .finally(function () {
            button.disabled = false;
          });
      });
    })();
  </script>
</section>
