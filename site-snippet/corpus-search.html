<!--
  corpus-search.html
  Self-contained semantic search over the Atlas Systems corpus.

  Drop this whole block into any page. It inherits the site's CSS
  custom properties and fonts when present and carries hex fallbacks.
  One IIFE, styles scoped under .cs-w, results rendered via
  textContent only (never innerHTML with response data).
-->
<section class="cs-w" id="corpus-search" aria-label="Search the Atlas Systems corpus">
  <style>
    .cs-w {
      --csw-bg: var(--bg-1, #111118);
      --csw-bg-2: var(--bg-2, #1a1a24);
      --csw-border: var(--border, rgba(255, 255, 255, 0.08));
      --csw-text: var(--text, #e8e8e0);
      --csw-dim: var(--text-dim, #aaa9a0);
      --csw-faint: var(--text-faint, #555560);
      --csw-accent: var(--accent, #f5a623);
      display: block;
      background: var(--csw-bg);
      border: 1px solid var(--csw-border);
      border-radius: 6px;
      padding: 20px;
      font-family: "IBM Plex Mono", monospace;
      font-size: 13px;
      line-height: 1.6;
      color: var(--csw-text);
      max-width: 720px;
    }
    .cs-w * { box-sizing: border-box; }
    .cs-w-head { color: var(--csw-faint); margin-bottom: 12px; }
    .cs-w-head strong { color: var(--csw-text); font-weight: 500; letter-spacing: 0.04em; }
    .cs-w-form { display: flex; gap: 8px; }
    .cs-w-input {
      flex: 1 1 auto;
      min-width: 0;
      background: var(--csw-bg-2);
      border: 1px solid var(--csw-border);
      border-radius: 4px;
      color: var(--csw-text);
      font: inherit;
      padding: 8px 12px;
    }
    .cs-w-input:focus {
      outline: none;
      border-color: var(--csw-accent);
    }
    .cs-w-btn {
      flex: none;
      background: transparent;
      border: 1px solid var(--csw-accent);
      border-radius: 4px;
      color: var(--csw-accent);
      font: inherit;
      padding: 8px 16px;
      cursor: pointer;
    }
    .cs-w-btn:hover { background: rgba(245, 166, 35, 0.12); }
    .cs-w-btn:disabled { opacity: 0.5; cursor: wait; }
    .cs-w-status { margin: 12px 0 0; color: var(--csw-faint); font-size: 12px; }
    .cs-w-results { list-style: none; margin: 12px 0 0; padding: 0; display: grid; gap: 10px; }
    .cs-w-answer {
      background: var(--csw-bg-2);
      border: 1px solid var(--csw-border);
      border-left: 2px solid var(--csw-accent);
      border-radius: 4px;
      padding: 12px 14px;
    }
    .cs-w-answer-text { color: var(--csw-dim); font-size: 13px; margin: 0; white-space: pre-wrap; }
    .cs-w-sources {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-top: 10px;
    }
    .cs-w-source {
      color: var(--csw-accent);
      border: 1px solid var(--csw-border);
      border-radius: 3px;
      padding: 1px 7px;
      font-size: 11px;
      text-decoration: none;
      overflow-wrap: anywhere;
    }
    .cs-w-source:hover { background: rgba(245, 166, 35, 0.12); }
  </style>

  <p class="cs-w-head"><strong>ATLAS CORPUS</strong> // ask the estate anything it has written</p>

  <form class="cs-w-form" id="csw-form">
    <label for="csw-q" class="cs-w-visually-hidden" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0);">Search query</label>
    <input class="cs-w-input" id="csw-q" name="q" type="search"
           placeholder="how do deploys get to Cloudflare?" maxlength="500"
           autocomplete="off" spellcheck="false" />
    <button class="cs-w-btn" id="csw-go" type="submit">ask</button>
  </form>

  <p class="cs-w-status" id="csw-status" aria-live="polite"></p>
  <ol class="cs-w-results" id="csw-results"></ol>

  <script>
    (function () {
      "use strict";
      var isLocalLab = location.hostname === "localhost" || location.hostname === "127.0.0.1";
      var localCorpusHost = location.hostname === "127.0.0.1" ? "127.0.0.1" : "localhost";
      var ENDPOINT = isLocalLab
        ? "http://" + localCorpusHost + ":8092/ask"
        : "https://corpus.atlas-systems.uk/ask";
      var FALLBACK_ENDPOINT = "https://corpus.atlas-systems.uk/ask";
      var form = document.getElementById("csw-form");
      var input = document.getElementById("csw-q");
      var button = document.getElementById("csw-go");
      var status = document.getElementById("csw-status");
      var list = document.getElementById("csw-results");

      function clearResults() {
        while (list.firstChild) list.removeChild(list.firstChild);
      }

      function sourceUrl(source) {
        return "https://github.com/AtlasReaper311/" +
          encodeURIComponent(source.repo) + "/blob/main/" +
          source.file.split("/").map(encodeURIComponent).join("/");
      }

      function renderAnswer(data) {
        var item = document.createElement("li");
        item.className = "cs-w-answer";

        var answer = document.createElement("p");
        answer.className = "cs-w-answer-text";
        answer.textContent = data.answer;
        item.appendChild(answer);

        if (data.sources && data.sources.length) {
          var sources = document.createElement("div");
          sources.className = "cs-w-sources";
          data.sources.forEach(function (source) {
            var tag = document.createElement("a");
            tag.className = "cs-w-source";
            tag.href = sourceUrl(source);
            tag.target = "_blank";
            tag.rel = "noopener noreferrer";
            tag.title = source.excerpt;
            tag.textContent = source.repo + "/" + source.file;
            sources.appendChild(tag);
          });
          item.appendChild(sources);
        }
        list.appendChild(item);
      }

      function searchCorpus(query) {
        var endpoints = [ENDPOINT];
        if (ENDPOINT !== FALLBACK_ENDPOINT) endpoints.push(FALLBACK_ENDPOINT);
        var index = 0;

        function tryNext(lastError) {
          if (index >= endpoints.length) throw lastError;
          var endpoint = endpoints[index++];
          var url = endpoint + "?q=" + encodeURIComponent(query) + "&top_k=5";
          return fetch(url, { cache: "no-store" })
            .then(function (response) {
              if (response.status === 429) throw new Error("rate limited; wait a minute");
              if (!response.ok) throw new Error("corpus answered " + response.status);
              return response.json();
            })
            .catch(function (err) {
              if (index < endpoints.length) {
                status.textContent = "local search unavailable; trying tunnel…";
                return tryNext(err);
              }
              throw err;
            });
        }

        return tryNext(new Error("search unavailable"));
      }

      form.addEventListener("submit", function (event) {
        event.preventDefault();
        var query = input.value.trim();
        if (!query) return;

        button.disabled = true;
        status.textContent = "asking…";
        clearResults();

        searchCorpus(query)
          .then(function (data) {
            if (!data.answer) {
              status.textContent = "no answer returned";
              return;
            }
            status.textContent = data.sources.length
              ? data.sources.length + " cited sources"
              : "answered without supporting sources";
            renderAnswer(data);
          })
          .catch(function (err) {
            status.textContent = "corpus unavailable: " + err.message;
          })
          .finally(function () {
            button.disabled = false;
          });
      });
    })();
  </script>
</section>
